services:
  filesplitter:
    build:
      context: .
      args:
        VERSION: ${VERSION:-dev}
    ports:
      - "4250:4250"
    volumes:
      # Primary media path — Bellesa library
      - /mnt/shared_vol/adult/Bellesa:/media/bellesa
      # Add more volume mounts here for additional libraries, e.g.:
      # - /mnt/shared_vol/adult/OtherStudio:/media/otherstudio
      #
      # Persistent data (SQLite database)
      - ./data:/app/data
    environment:
      # Comma-separated list of paths inside the container to scan
      MEDIA_PATHS: /media/bellesa
      # Add more paths here when you add volume mounts above, e.g.:
      # MEDIA_PATHS: /media/bellesa,/media/otherstudio

      # Port (4250 preferred; auto-increments if occupied)
      FLASK_PORT: "4250"

      # Scene detection method: auto (try frame-diff, fall back to black transitions),
      #   select (frame-diff only), or black (fade-to-black detection only)
      SCENE_METHOD: "auto"
      # Scene detection sensitivity (0.0=everything, 1.0=nothing; 0.4 is a good default)
      SCENE_THRESHOLD: "0.4"
      # Minimum gap between split points in seconds (prevents micro-clips)
      MIN_SCENE_DURATION: "120"
      # Black-transition detection: minimum black duration (seconds) and pixel darkness threshold
      BLACK_MIN_DURATION: "0.5"
      BLACK_PIX_TH: "0.10"

      # Anthology detection thresholds (any one criterion triggers split eligibility)
      SPLIT_MIN_DURATION: "5400"          # 90 minutes (files shorter than this are not anthologies)
      SPLIT_MIN_SIZE: "2147483648"        # 2 GB
      SPLIT_KEYWORDS: "Vol,Compilation,Anthology,Collection,Kink"

      # x265 encoding defaults (overridable per-job from the UI)
      X265_CRF: "28"
      X265_PRESET: "medium"
      TARGET_RESOLUTION: "original"      # original | 480p | 720p | 1080p | 1440p | 2160p

      # Max simultaneous ffmpeg jobs (keep low to avoid overwhelming the NAS)
      MAX_WORKERS: "2"

      DATABASE_PATH: /app/data/filesplitter.db

      # ThePornDB API key — enables content-based scene identification when splitting.
      # Free registration: https://theporndb.net/register
      TPDB_API_KEY: ""

      # Dashboard password — required when accessing from non-LAN IPs (e.g. Cloudflare Tunnel).
      # Direct LAN access (192.168.x.x, 10.x.x.x, 172.16-31.x.x) is always unrestricted.
      # DASHBOARD_PASSWORD: ""

      # --- NVIDIA GPU (NVENC) encoding ---
      # Uncomment ENCODER_BACKEND below and the deploy block to enable GPU encoding.
      # Requires: NVIDIA drivers installed on the TrueNAS host + nvidia-container-toolkit.
      # GPU encoding is 5-10x faster than CPU. Use CQ 22-24 for quality equivalent to CRF 28.
      # ENCODER_BACKEND: nvenc

    # Limit how much CPU and RAM ffmpeg jobs can consume on the host.
    # Adjust to match your NAS — this protects other services from being starved.
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: "4G"
        # --- Uncomment the reservations block below to enable GPU (NVENC) encoding ---
        # reservations:
        #   devices:
        #     - driver: nvidia
        #       count: 1
        #       capabilities: [gpu, video]

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4250/api/version')"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
